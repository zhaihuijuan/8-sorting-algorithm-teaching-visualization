<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复验证测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            padding: 20px;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }
        
        select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            padding: 8px 12px;
            font-size: 14px;
            margin: 10px;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .success {
            border-left: 4px solid #28a745;
        }
        
        .error {
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>语言切换和显示模式修复验证</h1>
        
        <div class="status">
            <h3>测试项目:</h3>
            <p>1. 语言切换按钮响应</p>
            <p>2. 显示模式下拉框响应</p>
            <p>3. 事件绑定正确性</p>
        </div>
        
        <!-- 语言切换测试 -->
        <div class="status">
            <h3>语言切换测试:</h3>
            <button id="language-toggle">
                <span>🌐</span>
                <span id="language-text">中文</span>
            </button>
            <p><strong>当前语言:</strong> <span id="current-language">zh</span></p>
            <p><strong>测试文本:</strong> <span id="test-text">生成新数组</span></p>
        </div>
        
        <!-- 显示模式测试 -->
        <div class="status">
            <h3>显示模式测试:</h3>
            <select id="display-mode">
                <option value="chinese">中文步骤说明</option>
                <option value="english">英文步骤说明</option>
                <option value="code">带注释代码</option>
            </select>
            <p><strong>当前模式:</strong> <span id="current-mode">chinese</span></p>
            <p><strong>模式状态:</strong> <span id="mode-status">未测试</span></p>
        </div>
        
        <!-- 测试结果 -->
        <div id="test-results" class="status">
            <h3>测试结果:</h3>
            <div id="results-content">点击上方按钮进行测试</div>
        </div>
        
        <!-- 手动测试按钮 -->
        <div class="status">
            <h3>手动测试:</h3>
            <button onclick="testLanguageToggle()">测试语言切换</button>
            <button onclick="testDisplayMode()">测试显示模式</button>
            <button onclick="runAllTests()">运行所有测试</button>
        </div>
    </div>

    <script src="language-manager.js"></script>
    <script>
        let testResults = [];
        
        function updateDisplay() {
            if (window.languageManager) {
                document.getElementById('current-language').textContent = window.languageManager.getCurrentLanguage();
                document.getElementById('test-text').textContent = window.languageManager.getText('generateArray');
                document.getElementById('language-text').textContent = window.languageManager.getText('languageToggle');
            }
        }
        
        function testLanguageToggle() {
            const resultsDiv = document.getElementById('results-content');
            let result = '';
            
            try {
                if (!window.languageManager) {
                    throw new Error('语言管理器未初始化');
                }
                
                const oldLang = window.languageManager.getCurrentLanguage();
                window.languageManager.toggleLanguage();
                const newLang = window.languageManager.getCurrentLanguage();
                
                if (oldLang !== newLang) {
                    result = `✅ 语言切换成功: ${oldLang} → ${newLang}`;
                    testResults.push({ test: '语言切换', status: 'success', message: result });
                } else {
                    result = `❌ 语言切换失败: 语言未改变 (${oldLang})`;
                    testResults.push({ test: '语言切换', status: 'error', message: result });
                }
                
                updateDisplay();
                
            } catch (error) {
                result = `❌ 语言切换错误: ${error.message}`;
                testResults.push({ test: '语言切换', status: 'error', message: result });
            }
            
            resultsDiv.innerHTML = result;
        }
        
        function testDisplayMode() {
            const resultsDiv = document.getElementById('results-content');
            const select = document.getElementById('display-mode');
            let result = '';
            
            try {
                // 模拟选择不同的显示模式
                const modes = ['chinese', 'english', 'code'];
                let testsPassed = 0;
                
                modes.forEach(mode => {
                    select.value = mode;
                    const event = new Event('change');
                    select.dispatchEvent(event);
                    
                    document.getElementById('current-mode').textContent = mode;
                    testsPassed++;
                });
                
                if (testsPassed === modes.length) {
                    result = `✅ 显示模式切换成功: 测试了 ${testsPassed} 种模式`;
                    testResults.push({ test: '显示模式', status: 'success', message: result });
                } else {
                    result = `❌ 显示模式切换部分失败: ${testsPassed}/${modes.length}`;
                    testResults.push({ test: '显示模式', status: 'error', message: result });
                }
                
                document.getElementById('mode-status').textContent = '已测试';
                
            } catch (error) {
                result = `❌ 显示模式错误: ${error.message}`;
                testResults.push({ test: '显示模式', status: 'error', message: result });
            }
            
            resultsDiv.innerHTML = result;
        }
        
        function runAllTests() {
            testResults = [];
            testLanguageToggle();
            setTimeout(() => {
                testDisplayMode();
                setTimeout(() => {
                    showFinalResults();
                }, 500);
            }, 500);
        }
        
        function showFinalResults() {
            const resultsDiv = document.getElementById('results-content');
            let html = '<h4>完整测试结果:</h4>';
            
            testResults.forEach(result => {
                const statusClass = result.status === 'success' ? 'success' : 'error';
                html += `<div class="status ${statusClass}">${result.message}</div>`;
            });
            
            const successCount = testResults.filter(r => r.status === 'success').length;
            const totalCount = testResults.length;
            
            html += `<div class="status"><strong>总结: ${successCount}/${totalCount} 测试通过</strong></div>`;
            
            resultsDiv.innerHTML = html;
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
            
            // 绑定语言切换事件
            const languageToggle = document.getElementById('language-toggle');
            if (languageToggle && window.languageManager) {
                languageToggle.addEventListener('click', () => {
                    console.log('语言切换按钮被点击');
                    window.languageManager.toggleLanguage();
                    updateDisplay();
                });
            }
            
            // 绑定显示模式切换事件
            const displayMode = document.getElementById('display-mode');
            if (displayMode) {
                displayMode.addEventListener('change', (e) => {
                    console.log('显示模式切换:', e.target.value);
                    document.getElementById('current-mode').textContent = e.target.value;
                    document.getElementById('mode-status').textContent = '已切换到 ' + e.target.value;
                });
            }
        });
        
        // 监听语言切换事件
        document.addEventListener('languageChanged', (event) => {
            console.log('语言切换事件触发:', event.detail);
            updateDisplay();
        });
        
        // 监听显示模式切换事件
        document.addEventListener('displayModeChanged', (event) => {
            console.log('显示模式切换事件触发:', event.detail);
        });
    </script>
</body>
</html>
