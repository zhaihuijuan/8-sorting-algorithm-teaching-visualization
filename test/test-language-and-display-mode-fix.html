<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言切换和显示模式修复测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 4px solid #4a9eff;
        }
        
        .test-title {
            color: #4a9eff;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .test-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .btn {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }
        
        select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            padding: 8px 12px;
            font-size: 14px;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .status.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
        }
        
        .status.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
        }
        
        .status.info {
            background: rgba(74, 158, 255, 0.2);
            border: 1px solid #4a9eff;
            color: #4a9eff;
        }
        
        .color-legend-test {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .legend-color.waiting { background: linear-gradient(135deg, #17a2b8 0%, #138496 100%); }
        .legend-color.comparing { background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%); }
        .legend-color.moving { background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); }
        .legend-color.inserting { background: linear-gradient(135deg, #17a2b8 0%, #138496 100%); }
        .legend-color.swapping { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); }
        .legend-color.completed { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .legend-color.marked { background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%); }
        
        .mini-bars {
            display: flex;
            gap: 5px;
            margin-top: 15px;
            align-items: flex-end;
        }
        
        .mini-bar {
            width: 30px;
            border-radius: 3px 3px 0 0;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .mini-bar-status {
            position: absolute;
            bottom: -25px;
            font-size: 8px;
            color: #888;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>语言切换和显示模式修复测试</h1>
        <p>测试语言切换功能、显示模式切换功能和新的6状态颜色系统</p>
        
        <!-- 语言切换测试 -->
        <div class="test-section">
            <h2 class="test-title">1. 语言切换测试</h2>
            <div class="test-controls">
                <button id="language-toggle" class="btn">
                    <span>🌐</span>
                    <span id="language-text">中文</span>
                </button>
                <button onclick="testLanguageSwitch()" class="btn">测试语言切换</button>
            </div>
            <div id="language-status" class="status info">
                当前语言: 中文 (zh)
            </div>
            <div>
                <p><strong>测试文本:</strong></p>
                <p id="test-algorithm-name">冒泡排序</p>
                <p id="test-button-text">开始排序</p>
                <p id="test-complexity">时间复杂度</p>
            </div>
        </div>
        
        <!-- 显示模式测试 -->
        <div class="test-section">
            <h2 class="test-title">2. 显示模式测试</h2>
            <div class="test-controls">
                <label>显示模式:</label>
                <select id="display-mode">
                    <option value="steps">步骤说明</option>
                    <option value="code">带注释的代码</option>
                </select>
                <button onclick="testDisplayMode()" class="btn">测试显示模式</button>
            </div>
            <div id="display-mode-status" class="status info">
                当前显示模式: 步骤说明 (steps)
            </div>
            <div id="display-mode-content" style="margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px;">
                <div style="color: #4a9eff; font-weight: bold;">步骤说明模式</div>
                <div style="color: #b0b0b0; margin-top: 8px;">将显示详细的操作步骤...</div>
            </div>
        </div>
        
        <!-- 6状态颜色系统测试 -->
        <div class="test-section">
            <h2 class="test-title">3. 6状态颜色系统测试</h2>
            <div class="test-controls">
                <button onclick="testColorStates()" class="btn">测试状态切换</button>
                <button onclick="resetColorStates()" class="btn">重置状态</button>
            </div>
            
            <div class="color-legend-test">
                <div class="legend-item">
                    <div class="legend-color waiting"></div>
                    <span id="state-waiting">待排</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color comparing"></div>
                    <span id="state-comparing">比较</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color moving"></div>
                    <span id="state-moving">移动</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color inserting"></div>
                    <span id="state-inserting">待插</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color swapping"></div>
                    <span id="state-swapping">交换</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color completed"></div>
                    <span id="state-completed">完成</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color marked"></div>
                    <span id="state-marked">标记</span>
                </div>
            </div>
            
            <div class="mini-bars">
                <div class="mini-bar" id="bar-0" style="height: 60px; background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);">
                    <div class="mini-bar-status">待排</div>
                </div>
                <div class="mini-bar" id="bar-1" style="height: 80px; background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);">
                    <div class="mini-bar-status">待排</div>
                </div>
                <div class="mini-bar" id="bar-2" style="height: 40px; background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);">
                    <div class="mini-bar-status">待排</div>
                </div>
                <div class="mini-bar" id="bar-3" style="height: 70px; background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);">
                    <div class="mini-bar-status">待排</div>
                </div>
                <div class="mini-bar" id="bar-4" style="height: 50px; background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);">
                    <div class="mini-bar-status">待排</div>
                </div>
            </div>
            
            <div id="color-status" class="status info">
                点击"测试状态切换"按钮查看不同状态的颜色效果
            </div>
        </div>
        
        <!-- 综合测试 -->
        <div class="test-section">
            <h2 class="test-title">4. 综合测试</h2>
            <div class="test-controls">
                <button onclick="runComprehensiveTest()" class="btn">运行综合测试</button>
            </div>
            <div id="comprehensive-status" class="status info">
                点击"运行综合测试"按钮进行完整功能测试
            </div>
        </div>
    </div>

    <!-- 引入项目文件 -->
    <script src="language-manager.js"></script>
    <script src="ui-handler.js"></script>
    
    <script>
        // 测试脚本
        let currentStateIndex = 0;
        const states = ['waiting', 'comparing', 'moving', 'inserting', 'swapping', 'completed', 'marked'];
        const stateColors = {
            waiting: 'linear-gradient(135deg, #17a2b8 0%, #138496 100%)',
            comparing: 'linear-gradient(135deg, #ffc107 0%, #fd7e14 100%)',
            moving: 'linear-gradient(135deg, #007bff 0%, #0056b3 100%)',
            inserting: 'linear-gradient(135deg, #17a2b8 0%, #138496 100%)',
            swapping: 'linear-gradient(135deg, #dc3545 0%, #c82333 100%)',
            completed: 'linear-gradient(135deg, #28a745 0%, #20c997 100%)',
            marked: 'linear-gradient(135deg, #9c27b0 0%, #673ab7 100%)'
        };
        
        function testLanguageSwitch() {
            const currentLang = window.languageManager.getCurrentLanguage();
            const statusDiv = document.getElementById('language-status');
            
            try {
                // 触发语言切换
                window.languageManager.toggleLanguage();
                
                const newLang = window.languageManager.getCurrentLanguage();
                statusDiv.className = 'status success';
                statusDiv.textContent = `语言切换成功: ${currentLang} → ${newLang}`;
                
                // 更新测试文本
                updateTestTexts();
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `语言切换失败: ${error.message}`;
            }
        }
        
        function updateTestTexts() {
            if (window.languageManager) {
                document.getElementById('test-algorithm-name').textContent = 
                    window.languageManager.getText('algorithms.bubbleSort');
                document.getElementById('test-button-text').textContent = 
                    window.languageManager.getText('startSort');
                document.getElementById('test-complexity').textContent = 
                    window.languageManager.getText('complexity.timeComplexityTitle');
                
                // 更新状态文本
                const stateElements = ['waiting', 'comparing', 'moving', 'inserting', 'swapping', 'completed', 'marked'];
                stateElements.forEach(state => {
                    const element = document.getElementById(`state-${state}`);
                    if (element) {
                        element.textContent = window.languageManager.getText(`states.${state}`);
                    }
                });
                
                // 更新柱状图状态文本
                for (let i = 0; i < 5; i++) {
                    const statusElement = document.querySelector(`#bar-${i} .mini-bar-status`);
                    if (statusElement) {
                        statusElement.textContent = window.languageManager.getText('states.waiting');
                    }
                }
            }
        }
        
        function testDisplayMode() {
            const select = document.getElementById('display-mode');
            const statusDiv = document.getElementById('display-mode-status');
            const contentDiv = document.getElementById('display-mode-content');
            
            try {
                const mode = select.value;
                
                // 模拟显示模式切换
                if (window.uiHandler) {
                    window.uiHandler.changeDisplayMode(mode);
                }
                
                statusDiv.className = 'status success';
                statusDiv.textContent = `显示模式切换成功: ${mode}`;
                
                // 更新内容显示
                if (mode === 'code') {
                    contentDiv.innerHTML = `
                        <div style="color: #ffc107; font-weight: bold; margin-bottom: 8px;">代码显示模式</div>
                        <div style="color: #ffffff; background: rgba(255,193,7,0.1); padding: 8px; border-radius: 4px; font-family: monospace;">
                            if (arr[j] > arr[j + 1]) {
                        </div>
                        <div style="color: #b0b0b0; font-size: 12px; margin-top: 10px;">
                            <strong>说明:</strong> 比较相邻元素的大小
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = `
                        <div style="color: #4a9eff; font-weight: bold;">步骤说明模式</div>
                        <div style="color: #b0b0b0; margin-top: 8px;">将显示详细的操作步骤...</div>
                    `;
                }
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `显示模式切换失败: ${error.message}`;
            }
        }
        
        function testColorStates() {
            const statusDiv = document.getElementById('color-status');
            
            try {
                // 循环切换状态
                const state = states[currentStateIndex];
                const color = stateColors[state];
                
                // 更新所有柱子的状态
                for (let i = 0; i < 5; i++) {
                    const bar = document.getElementById(`bar-${i}`);
                    const statusElement = bar.querySelector('.mini-bar-status');
                    
                    bar.style.background = color;
                    if (window.languageManager) {
                        statusElement.textContent = window.languageManager.getText(`states.${state}`);
                    } else {
                        statusElement.textContent = state;
                    }
                    
                    // 添加变换效果
                    switch (state) {
                        case 'comparing':
                        case 'moving':
                        case 'inserting':
                            bar.style.transform = 'translateY(-5px)';
                            break;
                        case 'swapping':
                            bar.style.transform = 'translateY(-8px) scale(1.05)';
                            break;
                        case 'marked':
                            bar.style.transform = 'translateY(-3px)';
                            break;
                        default:
                            bar.style.transform = 'translateY(0)';
                    }
                }
                
                statusDiv.className = 'status success';
                statusDiv.textContent = `当前状态: ${state} - 所有柱子已更新为此状态`;
                
                currentStateIndex = (currentStateIndex + 1) % states.length;
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `状态切换失败: ${error.message}`;
            }
        }
        
        function resetColorStates() {
            const statusDiv = document.getElementById('color-status');
            
            try {
                // 重置所有柱子为待排状态
                for (let i = 0; i < 5; i++) {
                    const bar = document.getElementById(`bar-${i}`);
                    const statusElement = bar.querySelector('.mini-bar-status');
                    
                    bar.style.background = stateColors.waiting;
                    bar.style.transform = 'translateY(0)';
                    
                    if (window.languageManager) {
                        statusElement.textContent = window.languageManager.getText('states.waiting');
                    } else {
                        statusElement.textContent = 'waiting';
                    }
                }
                
                currentStateIndex = 0;
                statusDiv.className = 'status success';
                statusDiv.textContent = '所有状态已重置为待排状态';
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `状态重置失败: ${error.message}`;
            }
        }
        
        function runComprehensiveTest() {
            const statusDiv = document.getElementById('comprehensive-status');
            let testResults = [];
            
            try {
                // 测试1: 语言管理器是否存在
                if (window.languageManager) {
                    testResults.push('✓ 语言管理器加载成功');
                } else {
                    testResults.push('✗ 语言管理器未加载');
                }
                
                // 测试2: UI处理器是否存在
                if (window.uiHandler) {
                    testResults.push('✓ UI处理器加载成功');
                } else {
                    testResults.push('✗ UI处理器未加载');
                }
                
                // 测试3: 语言切换功能
                const originalLang = window.languageManager ? window.languageManager.getCurrentLanguage() : null;
                if (originalLang) {
                    window.languageManager.toggleLanguage();
                    const newLang = window.languageManager.getCurrentLanguage();
                    if (newLang !== originalLang) {
                        testResults.push('✓ 语言切换功能正常');
                        // 切换回原语言
                        window.languageManager.toggleLanguage();
                    } else {
                        testResults.push('✗ 语言切换功能异常');
                    }
                } else {
                    testResults.push('✗ 无法测试语言切换功能');
                }
                
                // 测试4: 显示模式切换
                const displaySelect = document.getElementById('display-mode');
                if (displaySelect) {
                    testResults.push('✓ 显示模式选择器存在');
                } else {
                    testResults.push('✗ 显示模式选择器不存在');
                }
                
                // 测试5: 颜色状态系统
                if (window.uiHandler && window.uiHandler.visualizer) {
                    const visualizer = window.uiHandler.visualizer;
                    if (visualizer.states && visualizer.stateColors) {
                        testResults.push('✓ 6状态颜色系统已实现');
                    } else {
                        testResults.push('✗ 6状态颜色系统未实现');
                    }
                } else {
                    testResults.push('? 无法测试6状态颜色系统（需要完整UI环境）');
                }
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    <strong>综合测试结果:</strong><br>
                    ${testResults.join('<br>')}
                `;
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `综合测试失败: ${error.message}`;
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Test page loaded');
            
            // 等待一下确保所有脚本加载完成
            setTimeout(() => {
                updateTestTexts();
                
                // 绑定显示模式切换事件
                const displaySelect = document.getElementById('display-mode');
                if (displaySelect) {
                    displaySelect.addEventListener('change', testDisplayMode);
                }
            }, 500);
        });
    </script>
</body>
</html>
