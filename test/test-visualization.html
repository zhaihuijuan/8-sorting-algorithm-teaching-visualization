<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化颜色测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        
        .test-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .visualization-area {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            min-height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        
        .array-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 100%;
            width: 100%;
            justify-content: center;
            padding: 20px 0;
        }
        
        button {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎨 可视化颜色测试</h1>
        <p>测试排序过程中的柱状图颜色变换效果</p>
        
        <div class="controls">
            <button onclick="generateTestArray()">生成测试数组</button>
            <button onclick="testBubbleSort()">测试冒泡排序</button>
            <button onclick="testSelectionSort()">测试选择排序</button>
            <button onclick="testInsertionSort()">测试插入排序</button>
            <button onclick="resetVisualization()">重置</button>
            <button onclick="location.href='index.html'">返回主页面</button>
        </div>
        
        <div class="visualization-area">
            <div class="array-container" id="test-array-container">
                <!-- 柱状图将在这里显示 -->
            </div>
        </div>
        
        <div class="status" id="test-status">
            点击"生成测试数组"开始测试
        </div>
        
        <div style="margin-top: 20px;">
            <h3>颜色说明：</h3>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 30px; height: 20px; background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%); border-radius: 4px;"></div>
                    <span>未排序（蓝色）</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 30px; height: 20px; background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%); border-radius: 4px;"></div>
                    <span>比较中（黄色）</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 30px; height: 20px; background: linear-gradient(135deg, #e91e63 0%, #ad1457 100%); border-radius: 4px;"></div>
                    <span>交换中（粉色）</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 30px; height: 20px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%); border-radius: 4px;"></div>
                    <span>已排序（绿色）</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 30px; height: 20px; background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%); border-radius: 4px;"></div>
                    <span>基准元素（紫色）</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let testVisualizer = null;
        let testSortingEngine = null;
        let testArray = [];
        
        /**
         * 初始化测试环境
         */
        function initializeTest() {
            const container = document.getElementById('test-array-container');
            testVisualizer = new Visualizer(container);
            testSortingEngine = new SortingEngine(testVisualizer);
            testSortingEngine.setSpeed(100); // 设置较慢的速度以便观察
        }
        
        /**
         * 生成测试数组
         */
        function generateTestArray() {
            testArray = [64, 34, 25, 12, 22, 11, 90, 88, 76, 50, 42];
            testSortingEngine.setArray(testArray);
            testVisualizer.renderArray(testArray);
            testVisualizer.reset();
            
            updateStatus('测试数组已生成，包含11个元素');
        }
        
        /**
         * 测试冒泡排序
         */
        async function testBubbleSort() {
            if (testArray.length === 0) {
                updateStatus('请先生成测试数组');
                return;
            }
            
            updateStatus('开始测试冒泡排序...');
            await testSortingEngine.sort('bubbleSort');
            updateStatus('冒泡排序测试完成！所有元素应该显示为绿色（已排序）');
        }
        
        /**
         * 测试选择排序
         */
        async function testSelectionSort() {
            if (testArray.length === 0) {
                updateStatus('请先生成测试数组');
                return;
            }
            
            // 重新生成数组以重置状态
            generateTestArray();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            updateStatus('开始测试选择排序...');
            await testSortingEngine.sort('selectionSort');
            updateStatus('选择排序测试完成！所有元素应该显示为绿色（已排序）');
        }
        
        /**
         * 测试插入排序
         */
        async function testInsertionSort() {
            if (testArray.length === 0) {
                updateStatus('请先生成测试数组');
                return;
            }
            
            // 重新生成数组以重置状态
            generateTestArray();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            updateStatus('开始测试插入排序...');
            await testSortingEngine.sort('insertionSort');
            updateStatus('插入排序测试完成！所有元素应该显示为绿色（已排序）');
        }
        
        /**
         * 重置可视化
         */
        function resetVisualization() {
            if (testSortingEngine) {
                testSortingEngine.reset();
            }
            updateStatus('可视化已重置');
        }
        
        /**
         * 更新状态显示
         */
        function updateStatus(message) {
            const statusElement = document.getElementById('test-status');
            if (statusElement) {
                statusElement.textContent = message;
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            setTimeout(() => {
                initializeTest();
                updateStatus('测试环境已初始化，可以开始测试');
            }, 500);
        });
    </script>
    
    <!-- 引入必要的JavaScript文件 -->
    <script src="language-manager.js"></script>
    <script src="sorting-algorithms.js"></script>
    <script src="ui-handler.js"></script>
</body>
</html>
