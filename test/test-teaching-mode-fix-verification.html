<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学模式修复验证</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .btn {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.3);
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }
        
        .test-result {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            border-left: 4px solid #4caf50;
            color: #4caf50;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .test-error {
            border-left-color: #f44336;
            color: #f44336;
        }
        
        .array-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 150px;
            justify-content: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .array-bar {
            width: 25px;
            background: linear-gradient(135deg, #87ceeb 0%, #5dade2 100%);
            border-radius: 4px 4px 0 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 1px 3px rgba(135, 206, 235, 0.2);
        }
        
        .array-bar.completed {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            box-shadow: 0 1px 3px rgba(39, 174, 96, 0.2);
        }
        
        .array-bar.comparing {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            box-shadow: 0 1px 3px rgba(255, 193, 7, 0.3);
            transform: translateY(-5px);
        }
        
        .array-bar.swapping {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            box-shadow: 0 2px 4px rgba(220, 53, 69, 0.3);
            transform: translateY(-8px) scale(1.05);
        }
        
        .status-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .status-item {
            display: inline-block;
            margin: 5px 10px;
            padding: 5px 10px;
            background: rgba(74, 158, 255, 0.2);
            border-radius: 4px;
            font-size: 12px;
        }
        
        .current-step {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            min-height: 50px;
            border-left: 4px solid #4a9eff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #4a9eff; margin-bottom: 30px;">🔧 教学模式修复验证</h1>
        
        <div style="text-align: center; margin: 20px 0;">
            <button class="btn btn-success" onclick="testTeachingMode()">🎓 测试教学模式</button>
            <button class="btn btn-warning" onclick="testNormalMode()">⚡ 测试普通模式</button>
            <button class="btn" onclick="clearResults()">🧹 清除结果</button>
        </div>
        
        <div class="array-container" id="array-container">
            <!-- 数组可视化 -->
        </div>
        
        <div class="status-panel">
            <div class="status-item">比较次数: <span id="comparison-count">0</span></div>
            <div class="status-item">交换次数: <span id="swap-count">0</span></div>
            <div class="status-item">耗时: <span id="elapsed-time">0ms</span></div>
            <div class="status-item">已排序: <span id="sorted-count">0</span></div>
        </div>
        
        <div class="current-step" id="current-step">
            点击上方按钮开始测试...
        </div>
        
        <div id="test-results" class="test-result">
            等待测试开始...
        </div>
    </div>

    <!-- 引入必要的脚本 -->
    <script src="language-manager.js"></script>
    <script src="sorting-algorithms.js"></script>
    <script src="ui-handler.js"></script>

    <script>
        let testEngine = null;
        let testVisualizer = null;
        let testUIHandler = null;
        
        function log(message, type = 'info') {
            const results = document.getElementById('test-results');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            results.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            results.scrollTop = results.scrollHeight;
            
            // 更改样式
            results.className = `test-result ${type === 'error' ? 'test-error' : ''}`;
        }
        
        function clearResults() {
            document.getElementById('test-results').textContent = '测试日志已清除...\n';
            document.getElementById('current-step').textContent = '等待测试开始...';
        }
        
        // 初始化测试环境
        function initTestEnvironment() {
            // 创建测试用的可视化器
            testVisualizer = new Visualizer(document.getElementById('array-container'));
            
            // 创建测试用的排序引擎
            testEngine = new SortingEngine(testVisualizer);
            
            // 创建测试用的UI处理器
            testUIHandler = new UIHandler();
            testUIHandler.visualizer = testVisualizer;
            testUIHandler.sortingEngine = testEngine;
            
            // 设置全局引用
            window.uiHandler = testUIHandler;
            
            // 生成测试数组
            const testArray = [5, 2, 8, 1, 9, 3];
            testEngine.setArray(testArray);
            testVisualizer.renderArray(testArray);
            
            log('测试环境初始化完成', 'success');
        }
        
        async function testTeachingMode() {
            clearResults();
            log('🎓 开始测试教学模式', 'info');
            
            try {
                // 初始化测试环境
                initTestEnvironment();
                
                // 启用教学模式
                log('启用教学模式...', 'info');
                testEngine.setTeachingMode(true);
                testUIHandler.teachingMode = true;
                
                // 开始排序
                log('开始冒泡排序...', 'info');
                document.getElementById('current-step').textContent = '教学模式已启用，开始排序...';
                
                // 记录开始时间
                const startTime = Date.now();
                
                await testEngine.sort('bubbleSort');
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                log(`排序完成，耗时: ${duration}ms`, 'success');
                
                // 检查是否真的是逐步执行
                if (duration < 1000) {
                    log('⚠️ 警告：排序完成太快，可能没有正确等待用户确认', 'warning');
                    log('教学模式可能存在问题：应该等待用户在每一步点击确认', 'error');
                } else {
                    log('✅ 教学模式工作正常：排序过程有适当的等待时间', 'success');
                }
                
            } catch (error) {
                log(`测试过程中出现错误: ${error.message}`, 'error');
                console.error('Teaching mode test error:', error);
            }
        }
        
        async function testNormalMode() {
            clearResults();
            log('⚡ 开始测试普通模式', 'info');
            
            try {
                // 初始化测试环境
                initTestEnvironment();
                
                // 确保教学模式关闭
                log('确保教学模式关闭...', 'info');
                testEngine.setTeachingMode(false);
                testUIHandler.teachingMode = false;
                
                // 开始排序
                log('开始冒泡排序...', 'info');
                document.getElementById('current-step').textContent = '普通模式，开始连续排序...';
                
                // 记录开始时间
                const startTime = Date.now();
                
                await testEngine.sort('bubbleSort');
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                log(`排序完成，耗时: ${duration}ms`, 'success');
                
                // 普通模式应该相对较快
                if (duration > 5000) {
                    log('⚠️ 警告：普通模式排序时间过长', 'warning');
                } else {
                    log('✅ 普通模式工作正常：排序连续执行', 'success');
                }
                
            } catch (error) {
                log(`测试过程中出现错误: ${error.message}`, 'error');
                console.error('Normal mode test error:', error);
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            log('页面加载完成，准备测试环境', 'info');
            
            // 检查必要的类是否存在
            if (typeof SortingEngine === 'undefined') {
                log('❌ SortingEngine 类未找到', 'error');
                return;
            }
            
            if (typeof Visualizer === 'undefined') {
                log('❌ Visualizer 类未找到', 'error');
                return;
            }
            
            if (typeof UIHandler === 'undefined') {
                log('❌ UIHandler 类未找到', 'error');
                return;
            }
            
            log('✅ 所有必要的类都已加载', 'success');
            log('准备就绪，可以开始测试', 'info');
        });
    </script>
</body>
</html>
