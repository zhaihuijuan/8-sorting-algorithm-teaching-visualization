<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学模式用户体验修复测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .test-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 4px solid #4a9eff;
        }
        
        .test-button {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.3);
        }
        
        .test-button.success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .test-button.warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
        }
        
        .test-button.danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        
        .test-result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .test-result.pass {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
        }
        
        .test-result.fail {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
        }
        
        .test-result.info {
            background: rgba(74, 158, 255, 0.2);
            border: 1px solid #4a9eff;
            color: #4a9eff;
        }
        
        .status-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
            border-left: 4px solid #ffc107;
        }
        
        .controls-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 响应式样式 */
        @media (max-width: 768px) {
            .test-container {
                padding: 15px;
            }
            
            .controls-panel {
                flex-direction: column;
            }
            
            .test-button {
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <h1>🎓 教学模式用户体验修复测试</h1>
            <p>测试教学模式的状态管理和弹窗切换优化</p>
        </div>
        
        <!-- 主要功能区域 -->
        <div class="test-section">
            <h2>🎯 排序可视化控制</h2>
            <div class="controls-panel">
                <button id="generate-array" class="test-button">生成新数组</button>
                <button id="start-sort" class="test-button success">开始排序</button>
                <button id="pause-sort" class="test-button warning">暂停</button>
                <button id="resume-sort" class="test-button warning hidden">继续</button>
                <button id="reset-sort" class="test-button danger">重置</button>
                <button id="teaching-mode" class="test-button">教学模式</button>
            </div>
            
            <div class="status-display">
                <div><strong>当前步骤:</strong> <span id="current-step">准备就绪</span></div>
                <div><strong>比较次数:</strong> <span id="comparison-count">0</span></div>
                <div><strong>交换次数:</strong> <span id="swap-count">0</span></div>
                <div><strong>耗时:</strong> <span id="elapsed-time">0ms</span></div>
            </div>
            
            <!-- 数组可视化容器 -->
            <div id="array-container" style="
                height: 450px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 10px;
                margin: 20px 0;
                display: flex;
                align-items: end;
                justify-content: center;
                padding: 20px;
                overflow-x: auto;
            "></div>
        </div>
        
        <!-- 测试用例区域 -->
        <div class="test-section">
            <h2>🧪 测试用例</h2>
            
            <div style="margin-bottom: 20px;">
                <h3>测试 1: 教学模式状态管理</h3>
                <p>测试教学模式中途关闭后，排序是否继续在后台执行，"当前步骤"是否正确显示。</p>
                <button id="test-background-sorting" class="test-button">测试后台排序</button>
                <div id="test1-result" class="test-result" style="display: none;"></div>
            </div>
            
            <div style="margin-bottom: 20px;">
                <h3>测试 2: 弹窗切换流畅性</h3>
                <p>测试教学模式说明弹窗和教学步骤弹窗之间的切换是否平滑。</p>
                <button id="test-modal-transitions" class="test-button">测试弹窗切换</button>
                <div id="test2-result" class="test-result" style="display: none;"></div>
            </div>
            
            <div style="margin-bottom: 20px;">
                <h3>测试 3: 状态同步验证</h3>
                <p>验证UI状态与排序引擎状态是否正确同步。</p>
                <button id="test-state-sync" class="test-button">测试状态同步</button>
                <div id="test3-result" class="test-result" style="display: none;"></div>
            </div>
        </div>
        
        <!-- 日志区域 -->
        <div class="test-section">
            <h2>📋 测试日志</h2>
            <div id="test-log" style="
                background: rgba(0, 0, 0, 0.3);
                padding: 15px;
                border-radius: 8px;
                font-family: monospace;
                font-size: 12px;
                max-height: 300px;
                overflow-y: auto;
                white-space: pre-wrap;
            ">等待测试开始...</div>
        </div>
    </div>

    <!-- 引入核心文件 -->
    <script src="language-manager.js"></script>
    <script src="sorting-algorithms.js"></script>
    <script src="ui-handler.js"></script>

    <script>
        // 测试日志功能
        function log(message) {
            const logElement = document.getElementById('test-log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.textContent += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        // 显示测试结果
        function showTestResult(testId, passed, message) {
            const resultElement = document.getElementById(`${testId}-result`);
            resultElement.style.display = 'block';
            resultElement.className = `test-result ${passed ? 'pass' : 'fail'}`;
            resultElement.textContent = `${passed ? '✅ 通过' : '❌ 失败'}: ${message}`;
        }

        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', async function() {
            log('🚀 开始初始化测试环境...');
            
            try {
                // 初始化UI控制器
                window.uiHandler = new UIHandler();
                log('✅ UI控制器初始化成功');
                
                // 生成测试数组
                window.uiHandler.generateNewArray();
                log('✅ 测试数组生成成功');
                
                log('🎉 测试环境初始化完成，可以开始测试');
                
            } catch (error) {
                log(`❌ 初始化失败: ${error.message}`);
            }
        });

        // 测试 1: 后台排序功能
        document.getElementById('test-background-sorting').addEventListener('click', async function() {
            log('🧪 开始测试 1: 教学模式后台排序');
            
            try {
                // 1. 开启教学模式
                const uiHandler = window.uiHandler;
                uiHandler.teachingMode = true;
                await uiHandler.toggleTeachingMode();
                log('✅ 教学模式已开启');
                
                // 等待说明弹窗关闭
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // 2. 开始排序
                uiHandler.startSorting();
                log('✅ 排序已开始');
                
                // 等待第一个教学步骤出现
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // 3. 模拟关闭教学模式
                const sortingEngine = uiHandler.sortingEngine;
                const originalTeachingMode = sortingEngine.teachingMode;
                
                // 关闭教学模式
                sortingEngine.teachingMode = false;
                sortingEngine.sortingInBackground = true;
                uiHandler.updateBackgroundSortingStatus(true);
                log('✅ 教学模式已关闭，切换到后台排序');
                
                // 4. 检查状态
                const currentStepElement = document.getElementById('current-step');
                const currentStepText = currentStepElement.textContent;
                
                const isBackgroundSorting = currentStepText.includes('后台执行') || currentStepText.includes('background');
                const isNotCompleted = !currentStepText.includes('已完成') && !currentStepText.includes('completed');
                
                if (isBackgroundSorting && isNotCompleted) {
                    showTestResult('test1', true, '后台排序状态显示正确');
                    log('✅ 测试 1 通过: 后台排序状态正确');
                } else {
                    showTestResult('test1', false, `状态显示错误: ${currentStepText}`);
                    log(`❌ 测试 1 失败: 状态显示错误 - ${currentStepText}`);
                }
                
                // 重置状态
                uiHandler.resetSorting();
                
            } catch (error) {
                showTestResult('test1', false, `测试异常: ${error.message}`);
                log(`❌ 测试 1 异常: ${error.message}`);
            }
        });

        // 测试 2: 弹窗切换流畅性
        document.getElementById('test-modal-transitions').addEventListener('click', async function() {
            log('🧪 开始测试 2: 弹窗切换流畅性');
            
            try {
                const uiHandler = window.uiHandler;
                
                // 1. 开启教学模式，观察说明弹窗
                log('📱 开启教学模式，显示说明弹窗...');
                uiHandler.teachingMode = true;
                const instructionPromise = uiHandler.toggleTeachingMode();
                
                // 检查说明弹窗是否出现
                await new Promise(resolve => setTimeout(resolve, 500));
                const instructionModal = document.querySelector('.teaching-prompt');
                
                if (instructionModal) {
                    log('✅ 说明弹窗已显示');
                    
                    // 2. 等待说明弹窗自动关闭或手动关闭
                    await instructionPromise;
                    log('✅ 说明弹窗已关闭');
                    
                    // 3. 开始排序以触发教学步骤弹窗
                    uiHandler.startSorting();
                    
                    // 等待教学步骤弹窗出现
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    const stepModal = document.querySelector('.teaching-prompt');
                    
                    if (stepModal) {
                        log('✅ 教学步骤弹窗已显示');
                        showTestResult('test2', true, '弹窗切换流畅，无突兀感');
                        
                        // 关闭教学步骤弹窗
                        const continueBtn = stepModal.querySelector('#continue-step-btn');
                        if (continueBtn) {
                            continueBtn.click();
                        }
                    } else {
                        showTestResult('test2', false, '教学步骤弹窗未出现');
                        log('❌ 教学步骤弹窗未出现');
                    }
                } else {
                    showTestResult('test2', false, '说明弹窗未出现');
                    log('❌ 说明弹窗未出现');
                }
                
                // 重置状态
                uiHandler.resetSorting();
                
            } catch (error) {
                showTestResult('test2', false, `测试异常: ${error.message}`);
                log(`❌ 测试 2 异常: ${error.message}`);
            }
        });

        // 测试 3: 状态同步验证
        document.getElementById('test-state-sync').addEventListener('click', async function() {
            log('🧪 开始测试 3: 状态同步验证');
            
            try {
                const uiHandler = window.uiHandler;
                const sortingEngine = uiHandler.sortingEngine;
                
                // 1. 测试教学模式状态同步
                uiHandler.teachingMode = true;
                await uiHandler.toggleTeachingMode();
                
                const uiTeachingMode = uiHandler.teachingMode;
                const engineTeachingMode = sortingEngine.teachingMode;
                
                log(`UI教学模式状态: ${uiTeachingMode}`);
                log(`引擎教学模式状态: ${engineTeachingMode}`);
                
                if (uiTeachingMode === engineTeachingMode) {
                    log('✅ 教学模式状态同步正确');
                } else {
                    log('❌ 教学模式状态同步失败');
                }
                
                // 2. 测试后台排序标志
                sortingEngine.sortingInBackground = true;
                uiHandler.updateBackgroundSortingStatus(true);
                
                const currentStep = document.getElementById('current-step').textContent;
                const hasBackgroundIndicator = currentStep.includes('后台') || currentStep.includes('background');
                
                if (hasBackgroundIndicator) {
                    log('✅ 后台排序状态显示正确');
                } else {
                    log('❌ 后台排序状态显示错误');
                }
                
                // 3. 综合评估
                const allSynced = (uiTeachingMode === engineTeachingMode) && hasBackgroundIndicator;
                
                if (allSynced) {
                    showTestResult('test3', true, '所有状态同步正确');
                    log('✅ 测试 3 通过: 状态同步验证成功');
                } else {
                    showTestResult('test3', false, '部分状态同步失败');
                    log('❌ 测试 3 失败: 状态同步验证失败');
                }
                
                // 重置状态
                uiHandler.resetSorting();
                
            } catch (error) {
                showTestResult('test3', false, `测试异常: ${error.message}`);
                log(`❌ 测试 3 异常: ${error.message}`);
            }
        });

        // 监听教学模式按钮点击
        document.getElementById('teaching-mode').addEventListener('click', function() {
            log('🎓 用户点击教学模式按钮');
        });

        // 监听排序开始
        document.getElementById('start-sort').addEventListener('click', function() {
            log('▶️ 用户开始排序');
        });

        // 监听重置
        document.getElementById('reset-sort').addEventListener('click', function() {
            log('🔄 用户重置排序');
        });
    </script>
</body>
</html>
