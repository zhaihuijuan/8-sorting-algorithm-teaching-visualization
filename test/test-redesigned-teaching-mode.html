<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八大排序算法可视化</title>
    <style>
        /* 深色科技风格基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰图案 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* 主容器布局 */
        .main-container {
            display: grid;
            grid-template-areas: 
                "controls controls"
                "visualization info"
                "steps steps";
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            min-height: 100vh;
        }

        /* 顶部控制面板 */
        .control-panel {
            grid-area: controls;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 14px;
            color: #b0b0b0;
            min-width: 80px;
        }

        /* 输入控件样式 */
        select, input[type="range"], input[type="number"] {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            padding: 8px 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #4a9eff;
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.3);
        }

        select option {
            background: #1a1a2e;
            color: #ffffff;
        }

        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        /* 中间可视化区域 */
        .visualization-area {
            grid-area: visualization;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-height: 450px; /* 增加高度以容纳状态文本 */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
            overflow-x: auto; /* 允许水平滚动以防内容过宽 */
        }

        .array-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 100%;
            justify-content: center;
            padding: 20px 0 60px 0; /* 增加底部padding为状态文本留出空间 */
            min-width: fit-content; /* 确保容器能容纳所有柱子 */
        }

        /* 右侧信息面板 */
        .info-panel {
            grid-area: info;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
            max-height: 500px;
        }

        .info-section {
            margin-bottom: 25px;
        }

        .info-section h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 1px solid rgba(74, 158, 255, 0.3);
            padding-bottom: 5px;
        }

        .info-section p, .info-section ul {
            font-size: 14px;
            line-height: 1.5;
            color: #b0b0b0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #4a9eff;
        }
        
        /* 耗时显示特殊样式 - 等宽字体和固定宽度 */
        #elapsed-time {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            letter-spacing: 0.5px;
            min-width: 120px;
            text-align: center;
            display: inline-block;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        /* 底部步骤面板 */
        .steps-panel {
            grid-area: steps;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-height: 120px;
        }

        .steps-panel h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .current-step {
            font-size: 14px;
            line-height: 1.5;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #4a9eff;
        }

        /* 详细步骤说明的高亮样式 */
        .current-step .highlight-value {
            color: #ffc107;
            font-weight: bold;
            background: rgba(255, 193, 7, 0.2);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .current-step .highlight-index {
            color: #28a745;
            font-weight: bold;
            background: rgba(40, 167, 69, 0.2);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .current-step .highlight-range {
            color: #17a2b8;
            font-weight: bold;
            background: rgba(23, 162, 184, 0.2);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .current-step .highlight-round {
            color: #e91e63;
            font-weight: bold;
            background: rgba(233, 30, 99, 0.2);
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-areas: 
                    "controls"
                    "visualization"
                    "info"
                    "steps";
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
            }
        }

        @media (max-width: 768px) {
            .control-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group {
                justify-content: space-between;
            }
            
            .btn {
                justify-content: center;
                width: 100%;
                margin-bottom: 10px;
            }
            
            .main-container {
                padding: 10px;
                gap: 15px;
            }
            
            /* 教学模式弹窗在小屏幕上的适配 */
            .teaching-prompt {
                top: 10px !important;
                right: 10px !important;
                left: 10px !important;
                width: auto !important;
                max-width: none !important;
            }
        }

        /* 教学模式动画 */
        @keyframes slideInFromRight {
            0% { 
                transform: translateX(100%);
                opacity: 0;
            }
            100% { 
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOutToRight {
            0% { 
                transform: translateX(0);
                opacity: 1;
            }
            100% { 
                transform: translateX(100%);
                opacity: 0;
            }
        }
        
        @keyframes fadeInScale {
            0% { 
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes fadeOutScale {
            0% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% { 
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        /* 工具提示样式 */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 200px;
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 1000;
            bottom: 125%;
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.9) transparent transparent transparent;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #4a9eff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 颜色含义标记样式 */
        .color-legend {
            flex-wrap: wrap;
        }

        .legend-items {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #b0b0b0;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 6种状态的颜色定义 - 经典常用的颜色方案 */
        .legend-color.waiting {
            background: linear-gradient(135deg, #87ceeb 0%, #5dade2 100%);
        }

        .legend-color.comparing {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
        }

        .legend-color.moving {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        }

        .legend-color.inserting {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .legend-color.swapping {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .legend-color.completed {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        .legend-color.marked {
            background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%);
        }

        /* 柱状图状态文本样式 */
        .bar-status {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #888;
            white-space: nowrap;
            text-align: center;
        }

        /* 模态框基础样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            width: 85%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 顶部控制面板 -->
        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label for="algorithm-select">排序算法:</label>
                    <select id="algorithm-select">
                        <option value="bubbleSort">冒泡排序</option>
                        <option value="selectionSort">选择排序</option>
                        <option value="insertionSort">插入排序</option>
                        <option value="mergeSort">归并排序</option>
                        <option value="quickSort">快速排序</option>
                        <option value="heapSort">堆排序</option>
                        <option value="countingSort">计数排序</option>
                        <option value="radixSort">基数排序</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="array-size">数组大小:</label>
                    <input type="range" id="array-size" min="5" max="100" value="30">
                    <span id="array-size-value">30</span>
                </div>
                
                <div class="control-group">
                    <label for="sort-speed">排序速度:</label>
                    <input type="range" id="sort-speed" min="10" max="200" value="50">
                    <span id="sort-speed-value">50ms</span>
                </div>
                
                <div class="control-group">
                    <button id="language-toggle" class="btn btn-secondary tooltip">
                        <span>🌐</span>
                        <span id="language-text">中文</span>
                        <span class="tooltiptext">切换语言</span>
                    </button>
                </div>
            </div>
            
            <div class="control-row">
                <button id="generate-array" class="btn tooltip">
                    <span>🎲</span>
                    <span>生成新数组</span>
                    <span class="tooltiptext">生成随机数组</span>
                </button>
                
                <button id="start-sort" class="btn btn-success tooltip">
                    <span>▶️</span>
                    <span>开始排序</span>
                    <span class="tooltiptext">开始排序动画</span>
                </button>
                
                <button id="pause-sort" class="btn btn-warning tooltip" disabled>
                    <span>⏸️</span>
                    <span>暂停</span>
                    <span class="tooltiptext">暂停排序</span>
                </button>
                
                <button id="resume-sort" class="btn btn-success tooltip hidden">
                    <span>▶️</span>
                    <span>继续</span>
                    <span class="tooltiptext">继续排序</span>
                </button>
                
                <button id="reset-sort" class="btn btn-danger tooltip">
                    <span>🔄</span>
                    <span>重置</span>
                    <span class="tooltiptext">重置到初始状态</span>
                </button>
                
                <button id="complexity-compare" class="btn btn-secondary tooltip">
                    <span>📊</span>
                    <span>复杂度对比</span>
                    <span class="tooltiptext">查看算法复杂度对比表</span>
                </button>
                
                <button id="teaching-mode" class="btn btn-secondary tooltip">
                    <span>🎓</span>
                    <span>教学模式</span>
                    <span class="tooltiptext">启用教学模式</span>
                </button>
            </div>
            
            <div class="control-row">
                <div class="control-group">
                    <label>显示模式:</label>
                    <select id="display-mode">
                        <option value="steps">步骤说明</option>
                        <option value="code">带注释的代码</option>
                    </select>
                </div>
                
                <!-- 颜色含义标记 -->
                <div class="control-group color-legend">
                    <label>颜色含义:</label>
                    <div class="legend-items">
                        <div class="legend-item">
                            <div class="legend-color waiting"></div>
                            <span>待排</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color comparing"></div>
                            <span>比较</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color moving"></div>
                            <span>移动</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color inserting"></div>
                            <span>待插</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color swapping"></div>
                            <span>交换</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color completed"></div>
                            <span>完成</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color marked"></div>
                            <span>标记</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 中间可视化区域 -->
        <div class="visualization-area">
            <div class="array-container" id="array-container">
                <!-- 柱状图将在这里动态生成 -->
            </div>
        </div>

        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="info-section">
                <h3 id="algorithm-info-title">算法信息</h3>
                <div id="algorithm-info-content">
                    <p><strong id="time-complexity-label">时间复杂度:</strong></p>
                    <ul>
                        <li><span id="time-best-label">最好情况:</span> <span id="time-best">-</span></li>
                        <li><span id="time-average-label">平均情况:</span> <span id="time-average">-</span></li>
                        <li><span id="time-worst-label">最坏情况:</span> <span id="time-worst">-</span></li>
                    </ul>
                    <p><strong id="space-complexity-label">空间复杂度:</strong> <span id="space-complexity">-</span></p>
                    <p><strong id="stability-label">稳定性:</strong> <span id="stability">-</span></p>
                    <p id="algorithm-description">请选择一个排序算法查看详细信息。</p>
                </div>
            </div>
            
            <div class="info-section">
                <h3 id="stats-title">实时统计</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="comparison-count">0</div>
                        <div class="stat-label">比较次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="swap-count">0</div>
                        <div class="stat-label">交换次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="elapsed-time">0ms</div>
                        <div class="stat-label">耗时</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="sorted-count">0</div>
                        <div class="stat-label">已排序</div>
                    </div>
                </div>
                
                <div id="pointers-info" style="margin-top: 15px;">
                    <p><strong>指针位置:</strong></p>
                    <div id="pointer-values">
                        <!-- 指针信息将在这里动态显示 -->
                    </div>
                </div>
            </div>
            
            <div class="info-section">
                <h3 id="code-title">算法代码</h3>
                <pre id="algorithm-code" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; font-size: 12px; line-height: 1.4; overflow-x: auto;">
// 选择一个算法查看代码
                </pre>
            </div>
        </div>

        <!-- 底部步骤面板 -->
        <div class="steps-panel">
            <h3 id="steps-title">当前步骤</h3>
            <div class="current-step" id="current-step">
                准备开始排序...
            </div>
        </div>
    </div>

    <!-- 算法介绍模态框 -->
    <div id="algorithm-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">算法介绍</h2>
            <div id="modal-content">
                <!-- 模态框内容将动态填充 -->
            </div>
            <button id="modal-close-btn" class="btn" style="margin-top: 20px;">
                <span>✓</span>
                <span>我已了解</span>
            </button>
        </div>
    </div>

    <!-- 复杂度对比模态框 -->
    <div id="complexity-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="complexity-modal-title">算法复杂度对比表</h2>
            <div id="complexity-table-container">
                <!-- 复杂度对比表将动态生成 -->
            </div>
        </div>
    </div>
