<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Display Fix Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 4px solid #4a9eff;
        }
        
        .btn {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }
        
        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }
        
        .status-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #ffc107;
        }
        
        .current-step {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4a9eff;
            margin: 10px 0;
            min-height: 80px;
            font-family: monospace;
            line-height: 1.4;
        }
        
        .test-log {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-radius: 3px;
        }
        
        .log-info {
            color: #17a2b8;
        }
        
        .log-success {
            color: #28a745;
        }
        
        .log-warning {
            color: #ffc107;
        }
        
        .log-error {
            color: #dc3545;
        }
        
        .array-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 200px;
            justify-content: center;
            padding: 20px 0 60px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .display-mode-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .mode-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
        
        .mode-card.active {
            border-left-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔧 Step Display Fix Test</h1>
        <p>测试修复后的步骤显示功能：验证排序过程中"当前步骤"能够正确更新，包括不同的显示模式。</p>
        
        <div class="control-section">
            <h2>🎮 控制面板</h2>
            
            <div style="margin-bottom: 15px;">
                <label>算法选择:</label>
                <select id="algorithm-select" style="margin-left: 10px; padding: 5px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">
                    <option value="bubbleSort">冒泡排序</option>
                    <option value="selectionSort">选择排序</option>
                    <option value="insertionSort">插入排序</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>显示模式:</label>
                <select id="display-mode" style="margin-left: 10px; padding: 5px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">
                    <option value="steps">步骤说明</option>
                    <option value="code">代码显示</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <button id="generate-array" class="btn">🎲 生成新数组</button>
                <button id="start-sort" class="btn btn-success">▶️ 开始排序</button>
                <button id="pause-sort" class="btn btn-warning" disabled>⏸️ 暂停</button>
                <button id="resume-sort" class="btn btn-success hidden">▶️ 继续</button>
                <button id="reset-sort" class="btn btn-danger">🔄 重置</button>
            </div>
        </div>
        
        <div class="control-section">
            <h2>📊 当前步骤显示</h2>
            <div class="status-display">
                <strong>当前步骤:</strong>
                <div id="current-step" class="current-step">
                    准备开始排序...
                </div>
            </div>
            
            <div class="display-mode-section">
                <div class="mode-card" id="steps-mode-card">
                    <h4>📝 步骤说明模式</h4>
                    <p>显示排序算法的详细步骤描述</p>
                </div>
                <div class="mode-card" id="code-mode-card">
                    <h4>💻 代码显示模式</h4>
                    <p>显示当前执行的代码行和解释</p>
                </div>
            </div>
        </div>
        
        <div class="control-section">
            <h2>🧪 测试功能</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button onclick="testStepsMode()" class="btn" style="background: linear-gradient(135deg, #e91e63 0%, #ad1457 100%);">
                    🔬 测试步骤模式
                </button>
                <button onclick="testCodeMode()" class="btn" style="background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%);">
                    🔬 测试代码模式
                </button>
                <button onclick="testModeSwitch()" class="btn" style="background: linear-gradient(135deg, #ff5722 0%, #d84315 100%);">
                    🔬 测试模式切换
                </button>
                <button onclick="testResetFunction()" class="btn" style="background: linear-gradient(135deg, #607d8b 0%, #455a64 100%);">
                    🔬 测试重置功能
                </button>
            </div>
        </div>
        
        <div class="control-section">
            <h2>📝 测试日志</h2>
            <div id="test-log" class="test-log">
                <div class="log-entry log-info">测试日志将在这里显示...</div>
            </div>
        </div>
        
        <!-- 可视化区域 -->
        <div class="array-container" id="array-container">
            <!-- 柱状图将在这里动态生成 -->
        </div>
    </div>

    <script src="language-manager.js"></script>
    <script src="sorting-algorithms.js"></script>
    <script src="ui-handler.js"></script>
    <script>
        let testLog = [];
        let stepUpdateCount = 0;
        let lastStepText = '';
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            testLog.push({ message: logEntry, type });
            
            const logContainer = document.getElementById('test-log');
            const logDiv = document.createElement('div');
            logDiv.className = `log-entry log-${type}`;
            logDiv.textContent = logEntry;
            logContainer.appendChild(logDiv);
            
            // 滚动到底部
            logContainer.scrollTop = logContainer.scrollHeight;
            
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function getCurrentStepText() {
            const stepElement = document.getElementById('current-step');
            return stepElement ? stepElement.textContent.trim() : '';
        }
        
        function updateModeCards() {
            const currentMode = window.uiHandler ? window.uiHandler.displayMode : 'steps';
            
            const stepsCard = document.getElementById('steps-mode-card');
            const codeCard = document.getElementById('code-mode-card');
            
            stepsCard.classList.toggle('active', currentMode === 'steps');
            codeCard.classList.toggle('active', currentMode === 'code');
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // 监听步骤变化
        function setupStepMonitoring() {
            const stepElement = document.getElementById('current-step');
            if (stepElement) {
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.type === 'childList' || mutation.type === 'characterData') {
                            const newText = getCurrentStepText();
                            if (newText !== lastStepText) {
                                stepUpdateCount++;
                                log(`步骤更新 #${stepUpdateCount}: "${newText}"`, 'info');
                                lastStepText = newText;
                            }
                        }
                    });
                });
                
                observer.observe(stepElement, { 
                    childList: true, 
                    subtree: true, 
                    characterData: true 
                });
                
                log('✅ 步骤监听器已设置', 'success');
            }
        }
        
        // 测试步骤模式
        async function testStepsMode() {
            log('🔬 开始测试步骤说明模式...', 'info');
            
            try {
                // 设置为步骤模式
                document.getElementById('display-mode').value = 'steps';
                if (window.uiHandler) {
                    window.uiHandler.changeDisplayMode('steps');
                }
                updateModeCards();
                
                stepUpdateCount = 0;
                lastStepText = getCurrentStepText();
                
                // 开始排序
                log('开始排序测试...', 'info');
                document.getElementById('start-sort').click();
                
                // 等待一段时间观察步骤更新
                await sleep(3000);
                
                // 暂停排序
                document.getElementById('pause-sort').click();
                await sleep(500);
                
                // 重置
                document.getElementById('reset-sort').click();
                await sleep(500);
                
                if (stepUpdateCount > 0) {
                    log(`✅ 步骤模式测试通过: 共更新 ${stepUpdateCount} 次步骤`, 'success');
                } else {
                    log('❌ 步骤模式测试失败: 没有检测到步骤更新', 'error');
                }
                
            } catch (error) {
                log(`❌ 步骤模式测试错误: ${error.message}`, 'error');
            }
        }
        
        // 测试代码模式
        async function testCodeMode() {
            log('🔬 开始测试代码显示模式...', 'info');
            
            try {
                // 设置为代码模式
                document.getElementById('display-mode').value = 'code';
                if (window.uiHandler) {
                    window.uiHandler.changeDisplayMode('code');
                }
                updateModeCards();
                
                stepUpdateCount = 0;
                lastStepText = getCurrentStepText();
                
                // 开始排序
                log('开始排序测试...', 'info');
                document.getElementById('start-sort').click();
                
                // 等待一段时间观察步骤更新
                await sleep(3000);
                
                // 检查是否显示代码
                const currentStep = getCurrentStepText();
                const hasCodeContent = currentStep.includes('正在执行') || currentStep.includes('Executing') || 
                                     currentStep.includes('if') || currentStep.includes('arr[');
                
                // 暂停排序
                document.getElementById('pause-sort').click();
                await sleep(500);
                
                // 重置
                document.getElementById('reset-sort').click();
                await sleep(500);
                
                if (stepUpdateCount > 0 && hasCodeContent) {
                    log(`✅ 代码模式测试通过: 共更新 ${stepUpdateCount} 次步骤，包含代码内容`, 'success');
                } else if (stepUpdateCount > 0) {
                    log(`⚠️ 代码模式部分通过: 有步骤更新但可能缺少代码内容`, 'warning');
                } else {
                    log('❌ 代码模式测试失败: 没有检测到步骤更新', 'error');
                }
                
            } catch (error) {
                log(`❌ 代码模式测试错误: ${error.message}`, 'error');
            }
        }
        
        // 测试模式切换
        async function testModeSwitch() {
            log('🔬 开始测试模式切换...', 'info');
            
            try {
                // 开始排序
                document.getElementById('start-sort').click();
                await sleep(1000);
                
                // 切换到代码模式
                log('切换到代码模式...', 'info');
                document.getElementById('display-mode').value = 'code';
                if (window.uiHandler) {
                    window.uiHandler.changeDisplayMode('code');
                }
                updateModeCards();
                await sleep(1000);
                
                const codeStep = getCurrentStepText();
                
                // 切换到步骤模式
                log('切换到步骤模式...', 'info');
                document.getElementById('display-mode').value = 'steps';
                if (window.uiHandler) {
                    window.uiHandler.changeDisplayMode('steps');
                }
                updateModeCards();
                await sleep(1000);
                
                const stepsStep = getCurrentStepText();
                
                // 停止排序
                document.getElementById('pause-sort').click();
                await sleep(500);
                document.getElementById('reset-sort').click();
                await sleep(500);
                
                if (codeStep !== stepsStep) {
                    log('✅ 模式切换测试通过: 不同模式显示不同内容', 'success');
                } else {
                    log('⚠️ 模式切换测试警告: 两种模式显示相同内容', 'warning');
                }
                
            } catch (error) {
                log(`❌ 模式切换测试错误: ${error.message}`, 'error');
            }
        }
        
        // 测试重置功能
        async function testResetFunction() {
            log('🔬 开始测试重置功能...', 'info');
            
            try {
                // 开始排序
                document.getElementById('start-sort').click();
                await sleep(1500);
                
                // 暂停
                document.getElementById('pause-sort').click();
                await sleep(500);
                
                const beforeReset = getCurrentStepText();
                log(`重置前步骤: "${beforeReset}"`, 'info');
                
                // 重置
                document.getElementById('reset-sort').click();
                await sleep(500);
                
                const afterReset = getCurrentStepText();
                log(`重置后步骤: "${afterReset}"`, 'info');
                
                const expectedTexts = ['准备开始排序', '等待排序', 'Ready to start', 'Waiting'];
                const isCorrect = expectedTexts.some(text => afterReset.includes(text));
                const isIncorrect = afterReset.includes('完成') || afterReset.includes('completed');
                
                if (isCorrect && !isIncorrect) {
                    log('✅ 重置功能测试通过: 正确显示等待状态', 'success');
                } else {
                    log(`❌ 重置功能测试失败: "${afterReset}"`, 'error');
                }
                
            } catch (error) {
                log(`❌ 重置功能测试错误: ${error.message}`, 'error');
            }
        }
        
        // 等待UI初始化完成
        setTimeout(() => {
            if (window.uiHandler) {
                log('✅ UI Handler 初始化完成', 'success');
                updateModeCards();
                setupStepMonitoring();
                
                // 监听显示模式变化
                document.getElementById('display-mode').addEventListener('change', (e) => {
                    if (window.uiHandler) {
                        window.uiHandler.changeDisplayMode(e.target.value);
                        updateModeCards();
                        log(`显示模式切换到: ${e.target.value}`, 'info');
                    }
                });
                
            } else {
                log('❌ UI Handler 初始化失败', 'error');
            }
        }, 1000);
    </script>
</body>
</html>
