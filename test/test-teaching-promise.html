<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学模式Promise测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .btn {
            background: linear-gradient(135deg, #4a9eff 0%, #0078d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.3);
            margin: 5px;
        }
        
        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            border-left: 4px solid #4caf50;
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #4a9eff; margin-bottom: 30px;">🔍 教学模式Promise测试</h1>
        
        <div style="text-align: center; margin: 20px 0;">
            <button class="btn" onclick="testPromiseFlow()">🎯 测试Promise流程</button>
            <button class="btn" onclick="testDirectPrompt()">📦 直接测试提示框</button>
            <button class="btn" onclick="clearLog()">🧹 清除日志</button>
        </div>
        
        <div class="log" id="log">
            点击上方按钮开始测试...
        </div>
    </div>

    <!-- 引入必要的脚本 -->
    <script src="language-manager.js"></script>
    <script src="sorting-algorithms.js"></script>
    <script src="ui-handler.js"></script>

    <script>
        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.textContent += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').textContent = '日志已清除...\n';
        }
        
        // 测试Promise流程
        async function testPromiseFlow() {
            clearLog();
            log('🎯 开始测试Promise流程');
            
            try {
                // 初始化环境
                const languageManager = new LanguageManager();
                window.languageManager = languageManager;
                
                const visualizer = new Visualizer();
                const engine = new SortingEngine(visualizer);
                const uiHandler = new UIHandler();
                
                // 设置全局引用
                window.uiHandler = uiHandler;
                
                log('✅ 环境初始化完成');
                
                // 启用教学模式
                engine.setTeachingMode(true);
                uiHandler.teachingMode = true;
                
                log('✅ 教学模式已启用');
                
                // 测试步骤描述生成
                const stepDescription = engine.getStepDescription('comparing', {
                    value1: 5,
                    value2: 2,
                    pos1: 0,
                    pos2: 1
                });
                log(`📝 步骤描述: ${stepDescription}`);
                
                const explanation = engine.getStepExplanation('comparing', {
                    value1: 5,
                    value2: 2,
                    pos1: 0,
                    pos2: 1
                });
                log(`📖 步骤解释: ${explanation.substring(0, 50)}...`);
                
                // 测试教学步骤
                log('🎓 开始测试教学步骤...');
                const startTime = Date.now();
                
                const result = await engine.teachingStep('comparing', {
                    value1: 5,
                    value2: 2,
                    pos1: 0,
                    pos2: 1
                });
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                log(`⏱️ 教学步骤耗时: ${duration}ms`);
                log(`📤 返回结果: ${result}`);
                
                if (duration < 500) {
                    log('⚠️ 警告：教学步骤完成太快，可能没有正确等待用户确认');
                } else {
                    log('✅ 教学步骤正常，有适当的等待时间');
                }
                
            } catch (error) {
                log(`❌ 测试失败: ${error.message}`);
                console.error('Promise flow test error:', error);
            }
        }
        
        // 直接测试提示框
        async function testDirectPrompt() {
            clearLog();
            log('📦 开始直接测试提示框');
            
            try {
                // 创建简单的提示框测试
                log('📞 创建Promise...');
                
                const testPromise = new Promise((resolve) => {
                    log('🔄 Promise已创建，等待解析...');
                    
                    // 创建简单的测试按钮
                    const testButton = document.createElement('button');
                    testButton.textContent = '点击我解析Promise';
                    testButton.style.cssText = `
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        background: #28a745;
                        color: white;
                        border: none;
                        padding: 15px 30px;
                        border-radius: 8px;
                        font-size: 16px;
                        cursor: pointer;
                        z-index: 9999;
                        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
                    `;
                    
                    testButton.addEventListener('click', () => {
                        log('👆 按钮被点击，解析Promise');
                        testButton.remove();
                        resolve(true);
                    });
                    
                    document.body.appendChild(testButton);
                    log('🎯 测试按钮已显示，请点击它');
                });
                
                const startTime = Date.now();
                const result = await testPromise;
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                log(`⏱️ Promise解析耗时: ${duration}ms`);
                log(`📤 Promise结果: ${result}`);
                
                if (duration < 100) {
                    log('⚠️ 警告：Promise解析太快，可能没有等待用户交互');
                } else {
                    log('✅ Promise正常工作，等待了用户交互');
                }
                
            } catch (error) {
                log(`❌ 直接提示框测试失败: ${error.message}`);
                console.error('Direct prompt test error:', error);
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            log('🚀 页面加载完成');
            log('📋 准备就绪，可以开始测试');
        });
    </script>
</body>
</html>
